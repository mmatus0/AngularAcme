<nav class="navbar navbar-expand navbar-dark bg-primary px-3">
  <a class="navbar-brand" href="#">
    <img src="ACME-Logo-1981.png" width="80" alt="ACME Logo">
  </a>
  <div class="ms-3">
    <h1 id="titulo" class="mb-0">{{ title() }}</h1>
  </div>
</nav>

<div class="container-fluid mt-3">

  <div class="row mb-3 align-items-center">
    <div class="col-auto">Filtrar por:</div>
    <div class="col-md-4">
      <input
        type="text"
        class="form-control"
        [value]="listFilter()"
        (input)="listFilter.set($any($event.target).value)"
      >
    </div>
    <div class="col-md-4">
      Filtrado por: {{ listFilter() }}
    </div>
    <div class="col-md-2">
      <button class="btn btn-primary" (click)="abrirModal()">
        Crear Producto
      </button>
    </div>
  </div>

  <br>
  @if (isModalOpen()) {
    <app-modal-add (close)="cerrarModal()"></app-modal-add>
  }
  <br>

  @if (showChildren()) {
    <app-product-list
      [datos]="filteredProducts()"
      (datoEmitido)="datoRecibido.set($event)"
      (productosActualizados)="products.set($any($event))">
    </app-product-list>
  }

</div>
