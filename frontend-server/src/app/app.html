<!-- Barra de navegación — PDF 5.3 -->
<nav class="navbar navbar-expand navbar-dark bg-primary px-3">
  <a class="navbar-brand" href="#">
    <img src="ACME-Logo-1981.png" width="80" alt="ACME Logo">
  </a>
  <div class="ms-3">
    <h1 id="titulo" class="mb-0">{{ title() }}</h1>
  </div>
</nav>

<div class="container-fluid mt-3">


  <div class="row mb-3 align-items-center">
    <div class="col-auto">Filtrar por:</div>

    <div class="col-md-4">
      <input
        type="text"
        class="form-control"
        [value]="listFilter()"
        (input)="listFilter.set($any($event.target).value)"
      >
    </div>

    <div class="col-auto">
      Filtrado por: {{ listFilter() }}
    </div>
  </div>

  
  <div class="row mb-3 align-items-center">
    <div class="col-auto">
      Dato recibido: {{ datoRecibido() }}
    </div>

    
    <div class="col-auto">
      <button class="btn btn-primary" (click)="toggleChildren()">
        <i-bs name="eye"></i-bs>
        {{ showChildren() ? 'Ocultar Hijo' : 'Mostrar Hijo' }}
      </button>
    </div>

    
    <div class="col-auto">
      <button class="btn btn-success" (click)="crearProducto()">
        Crear Producto
      </button>
    </div>
  </div>


  @if (showChildren()) {
    <app-product-list
      [datos]="filteredProducts()"
      (datoEmitido)="datoRecibido.set($event)">
    </app-product-list>
  }

</div>
