<div class="modal fade show d-block" tabindex="-1" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h4 class="modal-title">Crear Producto</h4>
        <button type="button" class="close" data-dismiss="modal"
          (click)="ocultarModal()">&times;</button>
      </div>

      <div class="modal-body">
        <div class="form-group row">
          <label class="col-2 col-form-label">Nombre</label>
          <div class="col-md-10">
            <input type="text" class="form-control" placeholder="Nombre">
          </div>
        </div>

        <div class="form-group row">
          <label class="col-2 col-form-label">Código</label>
          <div class="col-md-10">
            <input type="text" class="form-control" placeholder="Código">
          </div>
        </div>

        <div class="form-group row">
          <label class="col-2 col-form-label">Fecha</label>
          <div class="col-md-10">
            <input type="date" class="form-control" placeholder="Fecha">
          </div>
        </div>

        <div class="form-group row">
          <label class="col-2 col-form-label">Precio</label>
          <div class="col-md-10">
            <input type="number" class="form-control" placeholder="Precio">
          </div>
        </div>

        <div class="form-group row">
          <label class="col-2 col-form-label">Rating</label>
          <div class="col-md-10">
            <input type="number" class="form-control" placeholder="Rating">
          </div>
        </div>

        <div class="form-group row">
          <label class="col-2 col-form-label">Descripción</label>
          <div class="col-md-10">
            <input type="text" class="form-control" placeholder="Descripción">
          </div>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-primary">Guardar</button>
        <button type="button" class="btn btn-danger" data-dismiss="modal"
          (click)="ocultarModal()">Cerrar</button>
      </div>

    </div>
  </div>
</div>
