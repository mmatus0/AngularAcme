<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow" style="width: 400px;">
    <div class="card-body p-4">

      <h3 class="text-center mb-4">
        <i class="bi bi-person-circle me-2"></i>Iniciar Sesión
      </h3>

      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="email" placeholder="correo@ejemplo.com">
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" formControlName="password" placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3" [disabled]="loginForm.invalid">
          Ingresar
        </button>
      </form>

      <div class="d-flex align-items-center mb-3">
        <hr class="flex-grow-1">
        <span class="px-2 text-muted small">o continúa con</span>
        <hr class="flex-grow-1">
      </div>

      <div class="d-flex justify-content-center">
        <asl-google-signin-button
          type="standard"
          size="large"
          text="signin_with"
          shape="rectangular"
          theme="outline"
          logo_alignment="left">
        </asl-google-signin-button>
      </div>

    </div>
  </div>
</div>
